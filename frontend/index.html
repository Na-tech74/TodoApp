<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .todo-card { max-width: 520px; width: 100%; }
    .done .todo-text { text-decoration: line-through; color: #adb5bd; }
    .delete-btn { opacity: 0; transition: opacity 0.15s; }
    .list-group-item:hover .delete-btn { opacity: 1; }
  </style>
</head>
<body>
  <div class="card todo-card shadow-sm">
    <div class="card-body p-4">
      <h1 class="h4 fw-bold mb-4">Việc Cần Làm</h1>

      <div class="input-group mb-4">
        <input type="text" id="todo-input" class="form-control" placeholder="Nhập công việc..." />
        <button id="add-btn" class="btn btn-primary">Thêm</button>
      </div>

      <ul id="todo-list" class="list-group list-group-flush"></ul>
    </div>
  </div>

  <script>
    const API = "https://todoapp-production-f96c.up.railway.app";

    const input = document.getElementById("todo-input");
    const addBtn = document.getElementById("add-btn");
    const list = document.getElementById("todo-list");

    async function fetchTodos() {
      const res = await fetch(`${API}/todos`);
      if (!res.ok) throw new Error("Failed to fetch");
      return res.json();
    }

    async function createTodo(title) {
      const res = await fetch(`${API}/todos`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title }),
      });
      if (!res.ok) throw new Error("Failed to create");
      return res.json();
    }

    async function updateTodo(id, data) {
      const res = await fetch(`${API}/todos/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
      if (!res.ok) throw new Error("Failed to update");
      return res.json();
    }

    async function deleteTodo(id) {
      const res = await fetch(`${API}/todos/${id}`, { method: "DELETE" });
      if (!res.ok) throw new Error("Failed to delete");
    }

    function startEdit(span, todo) {
      const input = document.createElement("input");
      input.type = "text";
      input.className = "form-control form-control-sm";
      input.value = todo.title;
      span.replaceWith(input);
      input.focus();
      input.select();

      async function save() {
        const title = input.value.trim();
        if (title && title !== todo.title) {
          await updateTodo(todo.id, { title });
        }
        renderTodos(await fetchTodos());
      }

      input.addEventListener("blur", save);
      input.addEventListener("keydown", async (e) => {
        if (e.key === "Enter") { e.preventDefault(); input.blur(); }
        if (e.key === "Escape") { renderTodos(await fetchTodos()); }
      });
    }

    function renderTodos(todos) {
      list.innerHTML = "";
      if (todos.length === 0) {
        const li = document.createElement("li");
        li.className = "list-group-item text-center text-muted py-4";
        li.textContent = "Chưa có việc nào. Thêm việc mới ở trên!";
        list.appendChild(li);
        return;
      }
      todos.forEach((todo) => {
        const li = document.createElement("li");
        li.className = `list-group-item d-flex align-items-center justify-content-between py-3${todo.done ? " done" : ""}`;

        const left = document.createElement("div");
        left.className = "d-flex align-items-center gap-2";

        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.className = "form-check-input m-0";
        cb.checked = todo.done;
        cb.addEventListener("change", async () => {
          await updateTodo(todo.id, { done: cb.checked });
          renderTodos(await fetchTodos());
        });

        const textWrap = document.createElement("div");
        textWrap.className = "d-flex flex-column";

        const span = document.createElement("span");
        span.textContent = todo.title;
        span.className = "todo-text";
        span.style.cursor = "text";
        span.addEventListener("click", () => startEdit(span, todo));

        const date = document.createElement("small");
        date.className = "text-muted";
        date.style.fontSize = "11px";
        if (todo.created_at) {
          const d = new Date(todo.created_at + "Z");
          date.textContent = d.toLocaleDateString("vi-VN", {
            day: "2-digit", month: "2-digit", year: "numeric",
            hour: "2-digit", minute: "2-digit"
          });
        } else {
          date.textContent = "—";
        }

        textWrap.appendChild(span);
        textWrap.appendChild(date);

        left.appendChild(cb);
        left.appendChild(textWrap);

        const delBtn = document.createElement("button");
        delBtn.textContent = "Xoá";
        delBtn.className = "delete-btn btn btn-sm btn-outline-danger border-0";
        delBtn.addEventListener("click", async (e) => {
          e.stopPropagation();
          await deleteTodo(todo.id);
          renderTodos(await fetchTodos());
        });

        li.appendChild(left);
        li.appendChild(delBtn);
        list.appendChild(li);
      });
    }

    async function loadTodos() {
      try {
        const todos = await fetchTodos();
        renderTodos(todos);
      } catch (err) {
        console.error(err);
      }
    }

    addBtn.addEventListener("click", async () => {
      const title = input.value.trim();
      if (!title) return;
      try {
        await createTodo(title);
        input.value = "";
        renderTodos(await fetchTodos());
      } catch (err) {
        console.error(err);
      }
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addBtn.click();
    });

    loadTodos();
  </script>
</body>
</html>
